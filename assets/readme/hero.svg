<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Finch</title>
  <desc id="desc">Finch — self-improvement orchestrator. Mines session history for correction and breakthrough signals, compacts them, and routes each to memory or a skill patch.</desc>
  <defs>
    <radialGradient id="bg" cx="0.26" cy="0.34" r="0.9" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#15101F"/>
      <stop offset="0.55" stop-color="#0C0F16"/>
      <stop offset="1" stop-color="#0B0E11"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C5CFF"/>
      <stop offset="1" stop-color="#9B7BFF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" fill="url(#bg)"/>
  <circle cx="980" cy="150" r="220" fill="#7C5CFF" opacity="0.06"/>
  <text x="64" y="104" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="800" letter-spacing="-1" fill="#F4F6FB">Finch</text>
  <rect x="66" y="126" width="64" height="4" rx="2" fill="url(#accent)"/>
  <text x="64" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#C7CEDB">Self-improvement orchestrator —</text>
  <text x="64" y="202" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" fill="#C7CEDB">mines history, routes insight.</text>
  <g transform="translate(940 210)">
    <g stroke="#7C5CFF" stroke-width="1.4" opacity="0.55">
      <line x1="0" y1="0" x2="-150" y2="-78"/>
      <line x1="0" y1="0" x2="150" y2="-78"/>
      <line x1="0" y1="0" x2="-150" y2="78"/>
      <line x1="0" y1="0" x2="150" y2="78"/>
      <line x1="0" y1="0" x2="0" y2="-110"/>
      <line x1="0" y1="0" x2="0" y2="110"/>
      <line x1="0" y1="0" x2="-110" y2="0"/>
      <line x1="0" y1="0" x2="110" y2="0"/>
    </g>
    <g fill="#7C5CFF">
      <circle cx="-150" cy="-78" r="5"/>
      <circle cx="150" cy="-78" r="5"/>
      <circle cx="-150" cy="78" r="5"/>
      <circle cx="150" cy="78" r="5"/>
      <circle cx="0" cy="-110" r="5"/>
      <circle cx="0" cy="110" r="5"/>
      <circle cx="-110" cy="0" r="5"/>
      <circle cx="110" cy="0" r="5"/>
    </g>
    <circle cx="0" cy="0" r="28" fill="#0E111A" stroke="url(#accent)" stroke-width="2.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#F4F6FB">MEM</text>
  </g>
  <text x="64" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#8A93A6" letter-spacing="2">CORRECTIONS IN. COMPACTED RULES OUT.</text>
</svg>
